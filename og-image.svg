<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6900;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#e05500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c04400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff4ee;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="rgba(0,0,0,0.28)" />
    </filter>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.18)" />
    </filter>
    <!-- Decorative circles background -->
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative background circles -->
  <circle cx="80" cy="80" r="160" fill="url(#circleGrad)" />
  <circle cx="1150" cy="560" r="200" fill="url(#circleGrad)" />
  <circle cx="1100" cy="60" r="120" fill="url(#circleGrad)" />
  <circle cx="100" cy="580" r="140" fill="url(#circleGrad)" />

  <!-- Main white card -->
  <rect x="80" y="60" width="1040" height="490" rx="28" ry="28" fill="url(#cardGrad)" filter="url(#shadow)" />

  <!-- Temu logo pill -->
  <rect x="480" y="88" width="240" height="66" rx="33" ry="33" fill="#ff6900" />
  <text x="600" y="134" font-family="'Arial Black', 'Arial', sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">temu</text>

  <!-- "COUPON CODE" label -->
  <text x="600" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ff6900" text-anchor="middle" letter-spacing="4" text-transform="uppercase">COUPON CODE 2026</text>

  <!-- Main headline -->
  <text x="600" y="262" font-family="'Arial Black', 'Arial', sans-serif" font-size="62" font-weight="900" fill="#1a1a1a" text-anchor="middle" letter-spacing="-2">30% OFF + $100 Bundle</text>

  <!-- Code box -->
  <rect x="340" y="285" width="520" height="78" rx="14" ry="14" fill="#fff4ee" stroke="#ff6900" stroke-width="3" />
  <text x="480" y="335" font-family="'Courier New', Courier, monospace" font-size="42" font-weight="700" fill="#ff6900" text-anchor="middle" letter-spacing="4">ala014131</text>
  <!-- Copy hint -->
  <rect x="825" y="298" width="20" height="20" rx="4" fill="none" stroke="#ff6900" stroke-width="2"/>
  <rect x="830" y="293" width="20" height="20" rx="4" fill="none" stroke="#ff6900" stroke-width="2"/>
  <text x="862" y="333" font-family="Arial, sans-serif" font-size="13" fill="#ff6900" font-weight="600">COPY</text>

  <!-- Divider line -->
  <line x1="160" y1="388" x2="1040" y2="388" stroke="#ffe4d0" stroke-width="1.5" />

  <!-- Verified tags row -->
  <!-- New Users badge -->
  <rect x="155" y="404" width="175" height="36" rx="18" ry="18" fill="#e8f5e9" filter="url(#badgeShadow)" />
  <text x="243" y="427" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2e7d32" text-anchor="middle">✓ New Users</text>

  <!-- Existing Users badge -->
  <rect x="345" y="404" width="200" height="36" rx="18" ry="18" fill="#e8f5e9" filter="url(#badgeShadow)" />
  <text x="445" y="427" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2e7d32" text-anchor="middle">✓ Existing Users</text>

  <!-- USA badge -->
  <rect x="562" y="404" width="108" height="36" rx="18" ry="18" fill="#e3f2fd" filter="url(#badgeShadow)" />
  <text x="616" y="427" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1565c0" text-anchor="middle">🇺🇸 USA</text>

  <!-- Canada badge -->
  <rect x="684" y="404" width="138" height="36" rx="18" ry="18" fill="#fce4ec" filter="url(#badgeShadow)" />
  <text x="753" y="427" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#b71c1c" text-anchor="middle">🇨🇦 Canada</text>

  <!-- Europe badge -->
  <rect x="836" y="404" width="130" height="36" rx="18" ry="18" fill="#e8eaf6" filter="url(#badgeShadow)" />
  <text x="901" y="427" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#283593" text-anchor="middle">🇪🇺 Europe</text>

  <!-- Worldwide badge -->
  <rect x="982" y="404" width="120" height="36" rx="18" ry="18" fill="#f3e5f5" filter="url(#badgeShadow)" />
  <text x="1042" y="427" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#6a1b9a" text-anchor="middle">🌍 Global</text>

  <!-- Bottom orange strip -->
  <rect x="80" y="490" width="1040" height="60" rx="0" ry="0" fill="#ff6900" />
  <rect x="80" y="490" width="1040" height="60" rx="0" ry="0" fill="#ff6900" />
  <!-- Round bottom corners only -->
  <rect x="80" y="518" width="1040" height="32" rx="0" fill="#ff6900" />
  <path d="M80 518 L80 550 Q80 550 108 550 L1092 550 Q1120 550 1120 550 L1120 518 Z" fill="#ff6900" />
  <path d="M80 490 L80 530 Q80 550 108 550 L1092 550 Q1120 550 1120 530 L1120 490 Z" fill="#ff6900" />

  <text x="520" y="527" font-family="'Courier New', Courier, monospace" font-size="19" fill="#ffffff" text-anchor="middle" opacity="0.9">temu.to/k/pu8ahm4u1gm</text>

  <!-- Verified badge -->
  <rect x="870" y="506" width="210" height="32" rx="16" ry="16" fill="rgba(255,255,255,0.18)" />
  <text x="975" y="527" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">✓ Verified May 2026</text>
</svg>
